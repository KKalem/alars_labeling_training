evaluation:
  model: "trained_models/yolo_model_5cls.pt"
  data: "training_pipeline/data.yaml"

  task: "obb" 
  imgsz: 1152
  conf: 0.001
  iou: 0.7
  device: "cpu"        # "cpu", "0", "1", etc.

  out_dir: "eval_out"
  save_debug: true
  plots: true
  save_json: true
  verbose: false

debug:
  line_width: 1

classes:
  names: ["sam", "buoy", "lolo", "catamaran", "boat"]

  # BGR colors for OpenCV
  colors:
    sam: [255, 0, 0]
    buoy: [255, 200, 100]
    lolo: [0, 255, 0]
    catamaran: [0, 165, 255]
    boat: [255, 0, 255]

  default_color: [200, 200, 200]